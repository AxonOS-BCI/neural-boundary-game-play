name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-release-gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build static artifact
        run: bash scripts/build_web.sh dist
      - name: Static smoke
        run: node qa/boundary-run-static-smoke.mjs
